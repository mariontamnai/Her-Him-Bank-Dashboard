<div class="transfer-content">
  <div class="topbar">
    <div>
      <h1>Transfer Money</h1>
      <p>Send money to any account</p>
    </div>
    <div class="avatar">JD</div>
  </div>

  <div class="transfer-layout">
    <div class="transfer-form-card">
      <h3>New Transfer</h3>

      <div class="form-group">
        <label>From Account</label>
        <select aria-label="From Account">
          <option>Current Account - **** 4521 (KES 124,500.00)</option>
          <option>Savings Account - **** 7893 (KES 87,200.00)</option>
        </select>
      </div>

      <div class="form-group">
        <label>Recipient Account Number</label>
        <input type="text" placeholder="Enter account number" />
      </div>

      <div class="form-group">
        <label>Recipient Name</label>
        <input type="text" placeholder="Enter recipient name" />
      </div>

      <div class="form-group">
        <label>Amount (KES)</label>
        <input type="number" placeholder="0.00" />
      </div>

      <div class="form-group">
        <label>Reason (Optional)</label>
        <input type="text" placeholder="e.g. Rent payment" />
      </div>

      <button class="transfer-btn">Send Money</button>
    </div>

    <div class="recent-transfers">
      <h3>Recent Transfers</h3>
      <div class="transfer-item">
        <div class="t-info">
          <div class="t-avatar">JK</div>
          <div>
            <p>John Kamau</p>
            <small>**** 1234 · 25 Feb</small>
          </div>
        </div>
        <span class="debit">- KES 5,000</span>
      </div>
      <div class="transfer-item">
        <div class="t-info">
          <div class="t-avatar">AM</div>
          <div>
            <p>Alice Mwangi</p>
            <small>**** 5678 · 20 Feb</small>
          </div>
        </div>
        <span class="debit">- KES 12,000</span>
      </div>
      <div class="transfer-item">
        <div class="t-info">
          <div class="t-avatar">PO</div>
          <div>
            <p>Peter Otieno</p>
            <small>**** 9012 · 15 Feb</small>
          </div>
        </div>
        <span class="debit">- KES 3,500</span>
      </div>
    </div>
  </div>
</div>
