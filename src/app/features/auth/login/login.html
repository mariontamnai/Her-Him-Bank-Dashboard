<div class="login-page">
   <div class="top-nav">
  <div class="nav-logo">
    <div class="nav-logo-icon">
      <svg width="22" height="22" viewBox="0 0 64 64">
        <path d="M32 4 L56 14 L56 34 C56 48 44 58 32 62 C20 58 8 48 8 34 L8 14 Z" fill="white" fill-opacity="0.9"/>
        <text x="32" y="40" text-anchor="middle" font-family="serif" font-size="22" font-weight="700" fill="#1a5c38">&amp;</text>
      </svg>
    </div>
    <span>Her&amp;Him Bank</span>
  </div>
</div>
  <div class="bg-image"></div>

  <div class="login-center">
    <div class="login-card">
      <div class="login-logo">
  <div class="logo-icon">
    <svg width="36" height="36" viewBox="0 0 64 64">
      <path d="M32 4 L56 14 L56 34 C56 48 44 58 32 62 C20 58 8 48 8 34 L8 14 Z" fill="white" fill-opacity="0.9"/>
      <text x="32" y="40" text-anchor="middle" font-family="serif" font-size="22" font-weight="700" fill="#1a5c38">&amp;</text>
    </svg>
  </div>
  <p class="bank-name">Her&amp;Him Bank</p>
  <h2>Welcome Back</h2>
  <p>Sign in to your account</p>
</div>

      <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>

      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <lucide-icon [img]="Mail" size="16" class="input-icon"></lucide-icon>
          <input type="email" placeholder="Enter your email"
            [(ngModel)]="email"
            (focus)="activeField='email'"
            (blur)="activeField=''" />
          <span class="dot-bounce" *ngIf="activeField === 'email' && email.length > 0">●</span>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <lucide-icon [img]="Lock" size="16" class="input-icon"></lucide-icon>
          <input [type]="showPassword ? 'text' : 'password'"
            placeholder="Enter your password"
            [(ngModel)]="password"
            (focus)="activeField='password'"
            (blur)="activeField=''" />
          <span class="toggle-password" (click)="togglePassword()">
            <lucide-icon [img]="showPassword ? EyeOff : Eye" size="16"></lucide-icon>
          </span>
          <span class="dot-bounce password-dot" *ngIf="activeField === 'password' && password.length > 0">●</span>
        </div>
      </div>

      <div class="remember-row">
        <label class="remember-me">
            <input type="checkbox" [(ngModel)]="rememberMe" />
            <span>Remember Me</span>
        </label>
        <span class="forgot-link">Forgot password?</span>
      </div>

      <button class="login-btn" (click)="signIn()">
        <span *ngIf="!loading">Sign In</span>
        <div class="bounce-dots" *ngIf="loading">
          <span></span><span></span><span></span>
        </div>
      </button>
      
      <div class="divider">
        <span>or continue with</span>
      </div>

        <div class="social-login">
            <button class="social-btn google" (click)="signInWithGoogle()">
            <img src="https://www.google.com/favicon.ico" width="18" height="18" alt="Google" />
            Google
            </button>
    </div>

    <p class="signup">Don't have an account? <span routerLink="/register">Sign Up</span></p>
  </div>
</div>
