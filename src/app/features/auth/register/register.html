<div class="login-page">
  <div class="top-nav">
  <div class="nav-logo">
    <div class="nav-logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <path d="M9 12l2 2 4-4"/>
      </svg>
    </div>
    <span class="nav-logo-text">Her&Him Bank</span>
  </div>
</div>
  <div class="bg-image"></div>

  <div class="login-center">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">
           <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
           <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
           <path d="M9 12l2 2 4-4"/>
          </svg>
        </div>
        <h2>Create Account</h2>
        <p>Join Her&Him Bank today</p>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <div class="form-group">
        <label>Full Name</label>
        <div class="input-wrapper">
          <input type="text" placeholder="Enter your full name"
            [(ngModel)]="fullName"
            (focus)="activeField='fullName'"
            (blur)="activeField=''" />
          <span class="dot-bounce" *ngIf="activeField === 'fullName' && fullName.length > 0">●</span>
        </div>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <input type="email" placeholder="Enter your email"
            [(ngModel)]="email"
            (focus)="activeField='email'"
            (blur)="activeField=''" />
          <span class="dot-bounce" *ngIf="activeField === 'email' && email.length > 0">●</span>
        </div>
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <div class="input-wrapper">
          <input type="tel" placeholder="+254 700 000 000"
            [(ngModel)]="phone"
            (focus)="activeField='phone'"
            (blur)="activeField=''" />
          <span class="dot-bounce" *ngIf="activeField === 'phone' && phone.length > 0">●</span>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <input [type]="showPassword ? 'text' : 'password'"
            placeholder="Create a password"
            [(ngModel)]="password"
            (focus)="activeField='password'"
            (blur)="activeField=''" />
          <span class="toggle-password" (click)="togglePassword()">
            <lucide-icon [img]="showPassword ? EyeOff : Eye" size="16"></lucide-icon>
          </span>
          <span class="dot-bounce password-dot" *ngIf="activeField === 'password' && password.length > 0">●</span>
          <p class="password-hint">Min 8 chars, uppercase, lowercase, number & special character</p>
        </div>
      </div>

      <button class="login-btn" (click)="register()">
        <span *ngIf="!loading">Create Account</span>
        <div class="bounce-dots" *ngIf="loading">
          <span></span><span></span><span></span>
        </div>
      </button>

      <p class="signup">Already have an account? <span routerLink="/login">Sign In</span></p>
    </div>
  </div>
</div>
