<div class="dashboard">
  <div class="sidebar">
    <div class="logo">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <path d="M9 12l2 2 4-4"/>
        </svg>
      </div>
      <h2>Her<span class="amp">&</span>Him Bank</h2>
    </div>

    <ul>
      <li routerLink="/dashboard" routerLinkActive="active">
        <lucide-icon [img]="Home" size="18"></lucide-icon> Dashboard
      </li>
      <li routerLink="/accounts" routerLinkActive="active">
        <lucide-icon [img]="Wallet" size="18"></lucide-icon> Accounts
      </li>
      <li routerLink="/transfer" routerLinkActive="active">
        <lucide-icon [img]="ArrowLeftRight" size="18"></lucide-icon> Transfer
      </li>
      <li routerLink="/transactions" routerLinkActive="active">
        <lucide-icon [img]="LayoutList" size="18"></lucide-icon> Transactions
      </li>
      <li routerLink="/bills" routerLinkActive="active">
        <lucide-icon [img]="FileText" size="18"></lucide-icon> Bills
      </li>
      <li routerLink="/profile" routerLinkActive="active">
        <lucide-icon [img]="User" size="18"></lucide-icon> Profile
      </li>
    </ul>

    <div class="sidebar-bottom">
      <li routerLink="/settings" routerLinkActive="active">
        <lucide-icon [img]="Settings" size="18"></lucide-icon> Settings
      </li>
      <li (click)="logout()">
        <lucide-icon [img]="LogOut" size="18"></lucide-icon> Logout
      </li>
    </div>
  </div>

  <div class="main">
    <router-outlet></router-outlet>
  </div>
</div>
